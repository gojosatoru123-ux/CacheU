<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Favicon set ──────────────────────────────────────────────── -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#7c3aed" />

    <!-- ── Default title & description (overridden per-page by seo.ts) ── -->
    <title>CacheU — Master System Design | LLD, HLD, Backend & Web Security</title>
    <meta
      name="description"
      content="CacheU is the fastest way to learn Low-Level Design, High-Level Design, Backend Architecture, and Web Security — with interactive mind-maps and practice quizzes."
    />
    <meta
      name="keywords"
      content="low level design, high level design, system design, backend architecture, web security, LLD, HLD, software engineering interview, design patterns"
    />
    <meta name="robots" content="index,follow" />
    <meta name="author" content="CacheU" />

    <!-- ── Canonical (overridden per-page) ──────────────────────────── -->
    <link rel="canonical" href="https://cacheu.dev" />

    <!-- ── Open Graph ───────────────────────────────────────────────── -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="CacheU" />
    <meta property="og:title" content="CacheU — Master System Design | LLD, HLD, Backend & Web Security" />
    <meta
      property="og:description"
      content="CacheU is the fastest way to learn Low-Level Design, High-Level Design, Backend Architecture, and Web Security — with interactive mind-maps and practice quizzes."
    />
    <meta property="og:url" content="https://cacheu.dev" />
    <meta property="og:image" content="https://cacheu.dev/og-image.webp" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="CacheU — System Design Learning Platform" />

    <!-- ── Twitter Card ─────────────────────────────────────────────── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@cacheu_dev" />
    <meta name="twitter:title" content="CacheU — Master System Design" />
    <meta
      name="twitter:description"
      content="Learn LLD, HLD, Backend Architecture, and Web Security with interactive mind-maps and quizzes."
    />
    <meta name="twitter:image" content="https://cacheu.dev/og-image.webp" />

    <!-- ── Preconnect for performance ───────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <!-- ── JSON-LD default: WebSite (overridden per-page) ───────────── -->
    <script id="page-jsonld" type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "CacheU",
        "url": "https://cacheu.dev",
        "description": "CacheU is the fastest way to learn Low-Level Design, High-Level Design, Backend Architecture, and Web Security.",
        "potentialAction": {
          "@type": "SearchAction",
          "target": {
            "@type": "EntryPoint",
            "urlTemplate": "https://cacheu.dev/docs/{search_term_string}"
          },
          "query-input": "required name=search_term_string"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
